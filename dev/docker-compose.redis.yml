services:

  redis:
    image: redis:alpine
    networks:
      - jwtup-network
    container_name: redis-jwtup
    restart: always
#    volumes:
#      - ./redis/data:/data
    ports:
      - 26379:6379
    healthcheck:
      test: ["CMD", "nc", "-vz", "localhost", "6379"]
      interval: 1s
networks:
  jwtup-network:
    driver: bridge